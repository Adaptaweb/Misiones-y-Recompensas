<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Tareas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/themes.css">
    <style>
        @import url('https://fonts.cdnfonts.com/css/minecraftia');

        body { 
            font-family: 'Minecraftia', sans-serif; text-align: center; 
            background-image: url('/static/minecraft/fondo_titulo.webp'); background-size: cover;
            background-position: center; background-attachment: fixed; background-color: #222;
            color: white; text-shadow: 2px 2px #000;
            margin: 0; padding: 20px 10px; box-sizing: border-box;
            min-height: 100vh; overflow-x: hidden; overflow-y: auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.5s;
        }
        .container { 
            background: rgba(0, 0, 0, 0.75); padding: 20px; border: 4px solid #555; 
            max-width: 600px; width: 95%; box-sizing: border-box; 
            position: relative; z-index: 10; margin-bottom: 20px; 
            transition: all 0.5s; 
        }
        .task-list { list-style: none; padding: 0; }
        .task-item { display: flex; justify-content: space-between; align-items: center; background: #444; margin: 5px 0; padding: 10px; border-radius: 4px; }
        .btn-del { background: #aa0000; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; justify-content: center; }
        input { padding: 10px; border-radius: 4px; border: none; }
        .btn-add { background: #2a8a2a; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        a { color: #55FF55; text-decoration: none; display: block; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Panel de Control de Misiones</h2>
        <ul class="task-list">
            {% for t in tareas %}
                <li class="task-item">
                    <span>{{ t.icono }} {{ t.nombre }}</span>
                    <button class="btn-del" onclick="quitarTarea('{{ t.nombre }}')">Eliminar</button>
                </li>
            {% endfor %}
        </ul>
        
        <div class="form-group">
            <input type="text" id="icono_nuevo" placeholder="Icono (ej: 🚀)" style="width: 80px;">
            <input type="text" id="nombre_nuevo" placeholder="Nombre de la Misión" style="flex-grow: 1; min-width: 150px;">
            <button class="btn-add" onclick="agregarTarea()">Agregar</button>
        </div>
        
        <div style="margin-top: 30px; display: flex; justify-content: space-around;">
            <a href="/historial">📜 Ver Historial Diario</a>
            <a href="/">🔙 Volver a la vista de Matías</a>
        </div>
    </div>

    <script>
        // Aplicar tema
        const savedTheme = localStorage.getItem('temaMatias');
        if (savedTheme === 'mario') {
            document.body.classList.add('theme-mario');
        }

        function quitarTarea(nombre) {
            if(!confirm("¿Eliminar misión: " + nombre + "?")) return;
            fetch('/modificar_tareas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({accion: 'quitar', nombre: nombre})
            }).then(() => location.reload());
        }

        function agregarTarea() {
            const nombre = document.getElementById('nombre_nuevo').value.trim();
            const icono = document.getElementById('icono_nuevo').value.trim() || '📌'; 
            if(!nombre) return;
            fetch('/modificar_tareas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({accion: 'agregar', nombre: nombre, icono: icono})
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
